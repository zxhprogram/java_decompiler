# Continuous Integration for java_decompiler.
#
# 流程:
#   1. 安装 Dart SDK + JDK 24
#   2. 安装依赖、静态分析
#   3. 编译 JDK 1.0→24 特性测试源码（需要 javac）
#   4. 运行全部测试
#
# 说明:
#   - test/jdk_features/ 的 .java 源码需用 javac 编译为 .class 后才能被反编译测试使用
#   - test/decompiler_golden_test.dart 引用的 bin/*.class 被 .gitignore 排除，
#     CI 环境中缺失时会自动跳过（不影响 CI 结果）

name: Dart CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Dart SDK
      - uses: dart-lang/setup-dart@v1

      # JDK 24（用于 javac 编译 JDK 特性测试源码；脚本会校验 --release 支持）
      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '24'

      - name: Install dependencies
        run: dart pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: dart analyze --fatal-infos

      - name: Compile JDK feature test sources
        run: dart run tool/compile_jdk_features.dart

      - name: Run tests
        run: dart test
